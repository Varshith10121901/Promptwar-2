version: '3.8'

services:
  # ─────────────────────────────────────────────
  # Frontend: Vite PWA served via Nginx
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  # ─────────────────────────────────────────────
  # Backend: FastAPI + Gemini Map Generator
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

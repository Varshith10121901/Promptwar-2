version: '3.8'

services:
  # ─────────────────────────────────────────────
  # Frontend: Vite PWA served via Nginx
  # Built with Node 22, served from nginx:stable-alpine
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  # ─────────────────────────────────────────────
  # Backend: FastAPI + Gemini 2.5 Flash Map API
  # Powered by Google Cloud AI (generative AI SDK)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CORS_ORIGINS=http://localhost:8080,http://localhost:5173
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

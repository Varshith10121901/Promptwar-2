name: VoteWise CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # BACKEND: Lint + Security + Tests
  # ──────────────────────────────────────────
  backend:
    name: Backend — Python Tests & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --exclude=__pycache__,venv,.venv --count --show-source --statistics

      - name: Security scan with Bandit
        run: |
          pip install bandit
          bandit -r . -ll --exclude tests -s B104,B101

      - name: Run tests with coverage
        env:
          GEMINI_API_KEY: "test-key-ci-placeholder"
        run: |
          pip install pytest pytest-cov pytest-asyncio httpx
          pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=70 -v

  # ──────────────────────────────────────────
  # FRONTEND: Lint + Tests
  # ──────────────────────────────────────────
  frontend:
    name: Frontend — JS Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical || true

      - name: Run Vitest unit tests
        run: npx vitest run --reporter=verbose

  # ──────────────────────────────────────────
  # DOCKER: Build Validation
  # ──────────────────────────────────────────
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t votewise-frontend .

      - name: Build backend Docker image
        run: docker build -t votewise-backend ./backend

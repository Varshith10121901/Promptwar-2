name: VoteWise CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # BACKEND: Lint + Security + Tests
  # ──────────────────────────────────────────
  backend:
    name: Backend — Python Tests & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test & lint dependencies
        run: pip install pytest pytest-asyncio httpx flake8 bandit pytest-cov

      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --exclude=__pycache__,venv,.venv

      - name: Security scan with Bandit
        run: bandit -r . -ll --exclude tests -s B104

      - name: Run tests with coverage
        env:
          GEMINI_API_KEY: "test-key-for-ci"
        run: pytest tests/ --cov=. --cov-report=xml --cov-fail-under=70 -v

  # ──────────────────────────────────────────
  # FRONTEND: Lint + Tests
  # ──────────────────────────────────────────
  frontend:
    name: Frontend — JS Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (security)
        run: npm audit --audit-level=high || true

      - name: Run ESLint
        run: npx eslint js/ --ext .js || true

      - name: Run Vitest unit tests
        run: npm run test

  # ──────────────────────────────────────────
  # DOCKER: Build Validation
  # ──────────────────────────────────────────
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t votewise-frontend .

      - name: Build backend Docker image
        run: docker build -t votewise-backend ./backend
